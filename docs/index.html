<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultra Minimalist Timer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #121214;
      --text: #f5f5f7;
      --muted: #9a9aa1;
      --line: #242428;
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #111215 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px 56px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.05;
      font-weight: 300;
      margin: 0 0 14px;
      letter-spacing: -0.03em;
    }

    p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
      margin: 0 0 16px;
    }

    .panel {
      margin-top: 36px;
      padding: 22px 24px;
      background: rgba(18, 18, 20, 0.88);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(10px);
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    .link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #16171a;
    }

    .link span:last-child {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Ultra Minimalist Timer</h1>
    <p>
      A quiet focus timer designed to disappear. Open the app and the countdown starts instantly.
      No setup. No visible buttons. No extra UI.
    </p>

    <section class="panel">
      <p>
        This website provides the public pages required for App Store distribution.
      </p>
      <div class="links">
        <a class="link" href="./privacy.html">
          <span>Privacy Policy</span>
          <span>Open</span>
        </a>
        <a class="link" href="./support.html">
          <span>Support</span>
          <span>Open</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
